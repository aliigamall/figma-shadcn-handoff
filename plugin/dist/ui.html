<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Only rules that Tailwind can't handle via utility classes (JS-toggled compound selectors) */
    .hidden { display: none !important; }
    .tab.active { color: #000; border-bottom-color: #000; font-weight: 500; }
    .status.error { color: #d00; }
    .status.success { color: #080; }
    .selection-badge.has-selection .dot { background: #22c55e; }
  </style>
</head>
<body class="font-sans text-[13px] text-[#1a1a1a] bg-white h-screen flex flex-col">

  <!-- Header / Logo -->
  <div class="px-4 py-[10px] border-b border-[#e5e5e5] flex-shrink-0 flex flex-col gap-2">
    <span class="flex gap-2 items-center flex-shrink-0">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#1a1a1a"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#1a1a1a" opacity="0.4"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#1a1a1a" opacity="0.4"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#1a1a1a" opacity="0.15"/>
      </svg>
      <span class="font-['Space_Grotesk'] text-[15px] font-semibold text-[#1a1a1a] tracking-[-0.2px]">Figma Handoff</span>
    </span>
    <span class="text-[11px] text-[#aaa] ml-1.5">Export design tokens and inspect components for shadcn/ui integration.</span>
  </div>

  <!-- Tabs -->
  <div class="flex border-b border-[#e5e5e5] flex-shrink-0">
    <button class="tab flex-1 py-[10px] border-none bg-transparent cursor-pointer text-[13px] text-[#666] font-[inherit] border-b-2 border-b-transparent -mb-px transition-colors active" data-tab="tokens">Export Tokens</button>
    <button class="tab flex-1 py-[10px] border-none bg-transparent cursor-pointer text-[13px] text-[#666] font-[inherit] border-b-2 border-b-transparent -mb-px transition-colors" data-tab="tailwind">Inspect</button>
  </div>

  <!-- Tokens panel -->
  <div id="panel-tokens" class="panel flex-1 p-4 flex flex-col gap-3 overflow-hidden">
    <button id="btn-export" class="px-4 py-2 border-none rounded-md cursor-pointer text-[13px] font-medium transition-opacity disabled:opacity-40 disabled:cursor-not-allowed bg-black text-white hover:bg-[#222]">Export globals.css</button>
    <textarea id="output-tokens" class="flex-1 w-full font-mono text-[11px] leading-relaxed p-[10px] border border-[#e5e5e5] rounded-md resize-none text-[#1a1a1a] bg-[#fafafa] outline-none min-h-0 focus:border-[#999] focus:bg-white" placeholder="Click Export to generate CSS…" readonly></textarea>
    <div class="flex gap-2 items-center">
      <span id="status-tokens" class="status text-[11px] text-[#888] min-h-4 flex-1"></span>
      <button id="btn-copy-tokens" class="px-4 py-2 border-none rounded-md cursor-pointer text-[13px] font-medium transition-opacity disabled:opacity-40 disabled:cursor-not-allowed bg-[#f0f0f0] text-black hover:bg-[#e5e5e5]" disabled>Copy</button>
    </div>

    <!-- Diff section -->
    <div id="diff-section" class="hidden flex flex-col gap-2">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-semibold uppercase tracking-[0.05em] text-[#888]">Changes since last export</span>
        <button id="btn-copy-patch" class="px-[10px] py-1 text-[11px] border-none rounded-md cursor-pointer font-medium transition-opacity bg-[#f0f0f0] text-black hover:bg-[#e5e5e5]">Copy patch</button>
      </div>
      <div id="diff-summary" class="flex gap-2 text-[11px]"></div>
      <div id="diff-list" class="flex flex-col gap-1 overflow-y-auto max-h-[180px]"></div>
    </div>
  </div>

  <!-- Tailwind / JSX panel -->
  <div id="panel-tailwind" class="panel flex-1 p-4 flex flex-col gap-3 overflow-hidden hidden">
    <div id="selection-badge" class="selection-badge flex items-center gap-1.5 text-[12px] text-[#555] bg-[#f5f5f5] rounded-md px-[10px] py-[7px]">
      <span class="dot w-[7px] h-[7px] rounded-full bg-[#ccc] flex-shrink-0"></span>
      <span id="selection-label">No node selected</span>
    </div>
    <!-- JSX section -->
    <div id="jsx-section" class="section flex flex-col gap-1.5 hidden">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-semibold uppercase tracking-[0.05em] text-[#888]">JSX</span>
        <button id="btn-copy-jsx" class="px-[10px] py-1 text-[11px] border-none rounded-md cursor-pointer font-medium transition-opacity bg-[#f0f0f0] text-black hover:bg-[#e5e5e5]">Copy</button>
      </div>
      <div id="jsx-import" class="font-mono text-[10px] text-[#888] bg-[#f5f5f5] rounded px-2 py-[5px] whitespace-nowrap overflow-hidden text-ellipsis"></div>
      <textarea id="output-jsx" class="flex-1 w-full font-mono text-[11px] leading-relaxed p-[10px] border border-[#e5e5e5] rounded-md resize-none text-[#1a1a1a] bg-[#fafafa] outline-none min-h-0" readonly></textarea>
    </div>

    <!-- Unmapped component hint -->
    <div id="unmapped-hint" class="hint text-[11px] text-[#f59e0b] bg-[#fffbeb] border border-[#fde68a] rounded-md px-[10px] py-[7px] hidden"></div>

    <!-- Tailwind section -->
    <div id="tailwind-section" class="section flex flex-col gap-1.5">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-semibold uppercase tracking-[0.05em] text-[#888]">Tailwind</span>
        <button id="btn-copy-tailwind" class="px-[10px] py-1 text-[11px] border-none rounded-md cursor-pointer font-medium transition-opacity disabled:opacity-40 disabled:cursor-not-allowed bg-[#f0f0f0] text-black hover:bg-[#e5e5e5]" disabled>Copy</button>
      </div>
      <textarea id="output-tailwind" class="flex-1 w-full font-mono text-[11px] leading-relaxed p-[10px] border border-[#e5e5e5] rounded-md resize-none text-[#1a1a1a] bg-[#fafafa] outline-none min-h-0" placeholder="Select a node then click Inspect…" readonly></textarea>
    </div>

    <span id="status-tailwind" class="status text-[11px] text-[#888] min-h-4"></span>
  </div>


<script>"use strict";
(() => {
  // src/ui.ts
  function copyToClipboard(text, btn) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  }
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      const target = tab.dataset.tab;
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.add("hidden"));
      tab.classList.add("active");
      document.getElementById(`panel-${target}`).classList.remove("hidden");
    });
  });
  var btnExport = document.getElementById("btn-export");
  var outputTokens = document.getElementById("output-tokens");
  var statusTokens = document.getElementById("status-tokens");
  var btnCopyTokens = document.getElementById("btn-copy-tokens");
  var diffSection = document.getElementById("diff-section");
  var diffSummary = document.getElementById("diff-summary");
  var diffList = document.getElementById("diff-list");
  var btnCopyPatch = document.getElementById("btn-copy-patch");
  var selectionBadge = document.getElementById("selection-badge");
  var selectionLabel = document.getElementById("selection-label");
  var outputTailwind = document.getElementById("output-tailwind");
  var statusTailwind = document.getElementById("status-tailwind");
  var btnCopyTailwind = document.getElementById("btn-copy-tailwind");
  var jsxSection = document.getElementById("jsx-section");
  var jsxImport = document.getElementById("jsx-import");
  var outputJsx = document.getElementById("output-jsx");
  var btnCopyJsx = document.getElementById("btn-copy-jsx");
  var unmappedHint = document.getElementById("unmapped-hint");
  btnExport.addEventListener("click", () => {
    btnExport.disabled = true;
    btnExport.textContent = "Exporting\u2026";
    statusTokens.textContent = "";
    statusTokens.className = "status";
    parent.postMessage({ pluginMessage: { type: "EXPORT_TOKENS" } }, "*");
  });
  btnCopyTokens.addEventListener("click", () => {
    copyToClipboard(outputTokens.value, btnCopyTokens);
  });
  btnCopyPatch.addEventListener("click", () => {
    var _a;
    copyToClipboard((_a = btnCopyPatch.dataset.patch) != null ? _a : "", btnCopyPatch);
  });
  function triggerInspect() {
    statusTailwind.textContent = "";
    statusTailwind.className = "status";
    jsxSection.classList.add("hidden");
    unmappedHint.classList.add("hidden");
    parent.postMessage({ pluginMessage: { type: "GET_TAILWIND" } }, "*");
  }
  btnCopyTailwind.addEventListener("click", () => {
    copyToClipboard(outputTailwind.value, btnCopyTailwind);
  });
  btnCopyJsx.addEventListener("click", () => {
    const full = `${jsxImport.textContent}

${outputJsx.value}`;
    copyToClipboard(full, btnCopyJsx);
  });
  window.onmessage = (event) => {
    var _a;
    const msg = event.data.pluginMessage;
    if (!msg)
      return;
    if (msg.type === "TOKENS_CSS") {
      outputTokens.value = msg.css;
      btnCopyTokens.disabled = false;
      btnExport.disabled = false;
      btnExport.textContent = "Export globals.css";
      statusTokens.textContent = `${msg.count} tokens exported`;
      statusTokens.className = "status success";
      const diff = msg.diff;
      if (diff && diff.hasChanges) {
        diffSection.classList.remove("hidden");
        btnCopyPatch.dataset.patch = (_a = msg.patch) != null ? _a : "";
        const badges = [];
        if (diff.changed > 0)
          badges.push(`<span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#fef9c3] text-[#a16207]">${diff.changed} changed</span>`);
        if (diff.added > 0)
          badges.push(`<span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#dcfce7] text-[#15803d]">${diff.added} added</span>`);
        if (diff.removed > 0)
          badges.push(`<span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#fee2e2] text-[#b91c1c]">${diff.removed} removed</span>`);
        diffSummary.innerHTML = badges.join("");
        diffList.innerHTML = diff.changes.map((c) => {
          const colors = {
            changed: "border-l-[#f59e0b]",
            added: "border-l-[#22c55e]",
            removed: "border-l-[#ef4444]"
          };
          const valueStr = c.type === "removed" ? `<span class="text-[#ef4444]">${c.before.light}</span>` : c.type === "added" ? `<span class="text-[#22c55e]">${c.after.light}</span>` : `<span class="text-[#ef4444] line-through mr-1">${c.before.light}</span><span class="text-[#22c55e]">${c.after.light}</span>`;
          return `<div class="flex flex-col pl-2 border-l-2 ${colors[c.type]} py-0.5">
          <span class="font-mono text-[10px] text-[#555]">${c.cssVar}</span>
          <span class="text-[10px] mt-0.5">${valueStr}</span>
        </div>`;
        }).join("");
      } else if (diff) {
        diffSection.classList.add("hidden");
      }
    }
    if (msg.type === "TAILWIND_RESULT") {
      if (msg.error) {
        statusTailwind.textContent = msg.error;
        statusTailwind.className = "status error";
        return;
      }
      if (msg.jsxResult) {
        jsxSection.classList.remove("hidden");
        unmappedHint.classList.add("hidden");
        jsxImport.textContent = msg.jsxResult.importLine;
        outputJsx.value = msg.jsxResult.jsx;
      } else if (msg.unmappedComponent) {
        jsxSection.classList.add("hidden");
        unmappedHint.classList.remove("hidden");
        unmappedHint.textContent = `"${msg.unmappedComponent}" is not in components.json yet`;
      } else {
        jsxSection.classList.add("hidden");
        unmappedHint.classList.add("hidden");
      }
      outputTailwind.value = msg.classes || "(no classes generated)";
      btnCopyTailwind.disabled = !msg.classes;
      statusTailwind.textContent = msg.nodeName ? `From: ${msg.nodeName}` : "";
      statusTailwind.className = "status";
    }
    if (msg.type === "SELECTION_CHANGE") {
      if (msg.hasSelection) {
        selectionBadge.classList.add("has-selection");
        selectionLabel.textContent = msg.nodeName || "1 node selected";
        triggerInspect();
      } else {
        selectionBadge.classList.remove("has-selection");
        selectionLabel.textContent = "No node selected";
        outputTailwind.value = "";
        jsxSection.classList.add("hidden");
        unmappedHint.classList.add("hidden");
        btnCopyTailwind.disabled = true;
        statusTailwind.textContent = "";
      }
    }
    if (msg.type === "ERROR") {
      btnExport.disabled = false;
      btnExport.textContent = "Export globals.css";
      statusTokens.textContent = msg.message;
      statusTokens.className = "status error";
      statusTailwind.textContent = msg.message;
      statusTailwind.className = "status error";
    }
  };
})();
</script></body>
</html>

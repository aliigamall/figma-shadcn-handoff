<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e5e5;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      color: #666;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab.active {
      color: #000;
      border-bottom-color: #000;
      font-weight: 500;
    }

    /* Panels */
    .panel {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }
    .panel.hidden { display: none; }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #000; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #222; }
    .btn-secondary { background: #f0f0f0; color: #000; }
    .btn-secondary:hover:not(:disabled) { background: #e5e5e5; }

    .row { display: flex; gap: 8px; }
    .row .btn { flex: 1; }

    /* Output area */
    textarea {
      flex: 1;
      width: 100%;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      line-height: 1.5;
      padding: 10px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      resize: none;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      min-height: 0;
    }
    textarea:focus { border-color: #999; background: #fff; }

    /* Status / info */
    .status {
      font-size: 11px;
      color: #888;
      min-height: 16px;
    }
    .status.error { color: #d00; }
    .status.success { color: #080; }

    /* Sections */
    .section { display: flex; flex-direction: column; gap: 6px; }
    .section.hidden { display: none; }
    .section-header { display: flex; align-items: center; justify-content: space-between; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* Import line */
    .import-line {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 10px;
      color: #888;
      background: #f5f5f5;
      border-radius: 4px;
      padding: 5px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hint for unmapped components */
    .hint {
      font-size: 11px;
      color: #f59e0b;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 7px 10px;
    }
    .hint.hidden { display: none; }

    /* Dev tab */
    .dev-empty { color: #999; font-size: 12px; text-align: center; margin-top: 32px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .dev-node-type { font-size: 11px; background: #fff3cd; color: #856404; border-radius: 5px; padding: 5px 10px; }
    .dev-tip { font-size: 10px; color: #bbb; max-width: 240px; line-height: 1.5; }
    .dev-header { margin-bottom: 10px; }
    .dev-name { font-size: 14px; font-weight: 600; display: block; }
    .dev-figma-name { font-size: 11px; color: #888; }
    .dev-props { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }
    .dev-prop { background: #f7f7f7; border-radius: 5px; padding: 6px 8px; }
    .dev-prop-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .dev-prop-name { font-size: 12px; font-weight: 500; }
    .dev-type-badge {
      font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 1px 5px; border-radius: 3px; background: #e5e5e5; color: #555;
    }
    .dev-type-badge.variant { background: #dbeafe; color: #1d4ed8; }
    .dev-type-badge.text    { background: #dcfce7; color: #15803d; }
    .dev-type-badge.boolean { background: #fef9c3; color: #a16207; }
    .dev-type-badge.instance_swap { background: #fce7f3; color: #be185d; }
    .dev-options { display: flex; flex-wrap: wrap; gap: 3px; }
    .dev-option {
      font-size: 10px; padding: 1px 6px; border-radius: 10px;
      background: #e5e5e5; color: #444;
    }
    .dev-option.current { background: #000; color: #fff; }
    .dev-text-value { font-size: 11px; color: #555; font-style: italic; }
    .dev-note { font-size: 10px; color: #aaa; margin-top: 4px; }

    /* Selection indicator (Tailwind tab) */
    .selection-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 7px 10px;
    }
    .selection-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .selection-badge.has-selection .dot { background: #22c55e; }
    .selection-badge .name {
      font-weight: 500;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button class="tab active" data-tab="tokens">Export Tokens</button>
    <button class="tab" data-tab="tailwind">Inspect</button>
    <button class="tab" data-tab="dev">Dev</button>
  </div>

  <!-- Tokens panel -->
  <div id="panel-tokens" class="panel">
    <button id="btn-export" class="btn btn-primary">Export globals.css</button>
    <textarea id="output-tokens" placeholder="Click Export to generate CSS…" readonly></textarea>
    <div class="row">
      <span id="status-tokens" class="status"></span>
      <button id="btn-copy-tokens" class="btn btn-secondary" disabled>Copy</button>
    </div>
  </div>

  <!-- Tailwind / JSX panel -->
  <div id="panel-tailwind" class="panel hidden">
    <div id="selection-badge" class="selection-badge">
      <span class="dot"></span>
      <span id="selection-label">No node selected</span>
    </div>
    <button id="btn-get-tailwind" class="btn btn-primary">Inspect</button>

    <!-- JSX section (shown only for mapped component instances) -->
    <div id="jsx-section" class="section hidden">
      <div class="section-header">
        <span class="section-label">JSX</span>
        <button id="btn-copy-jsx" class="btn btn-secondary btn-sm">Copy</button>
      </div>
      <div id="jsx-import" class="import-line"></div>
      <textarea id="output-jsx" readonly></textarea>
    </div>

    <!-- Unmapped component hint -->
    <div id="unmapped-hint" class="hint hidden"></div>

    <!-- Tailwind section -->
    <div id="tailwind-section" class="section">
      <div class="section-header">
        <span class="section-label">Tailwind</span>
        <button id="btn-copy-tailwind" class="btn btn-secondary btn-sm" disabled>Copy</button>
      </div>
      <textarea id="output-tailwind" placeholder="Select a node then click Inspect…" readonly></textarea>
    </div>

    <span id="status-tailwind" class="status"></span>
  </div>

  <!-- Dev tab -->
  <div id="panel-dev" class="panel hidden" style="overflow-y:auto">
    <div id="dev-empty" class="dev-empty">
      <div id="dev-empty-msg">Select a component instance to inspect</div>
      <div id="dev-node-type" class="dev-node-type hidden"></div>
      <div class="dev-tip">Click any component, component set, or instance — frames and groups won't work</div>
    </div>

    <div id="dev-content" class="hidden">
      <div class="dev-header">
        <span id="dev-component-name" class="dev-name"></span>
        <span id="dev-figma-name" class="dev-figma-name"></span>
      </div>

      <div class="section-label" style="margin-bottom:4px">Properties</div>
      <div id="dev-props" class="dev-props"></div>

      <div class="section-header" style="margin-top:8px">
        <span class="section-label">Draft JSON</span>
        <button id="btn-copy-draft" class="btn btn-secondary btn-sm">Copy</button>
      </div>
      <textarea id="dev-draft" readonly style="min-height:200px;flex:1"></textarea>
      <p class="dev-note">Copy → paste to Claude → say which shadcn component this is</p>
    </div>
  </div>

<script>"use strict";
(() => {
  // src/ui.ts
  function copyToClipboard(text, btn) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  }
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      const target = tab.dataset.tab;
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.add("hidden"));
      tab.classList.add("active");
      document.getElementById(`panel-${target}`).classList.remove("hidden");
    });
  });
  var btnExport = document.getElementById("btn-export");
  var outputTokens = document.getElementById("output-tokens");
  var statusTokens = document.getElementById("status-tokens");
  var btnCopyTokens = document.getElementById("btn-copy-tokens");
  var selectionBadge = document.getElementById("selection-badge");
  var selectionLabel = document.getElementById("selection-label");
  var btnGetTailwind = document.getElementById("btn-get-tailwind");
  var outputTailwind = document.getElementById("output-tailwind");
  var statusTailwind = document.getElementById("status-tailwind");
  var btnCopyTailwind = document.getElementById("btn-copy-tailwind");
  var jsxSection = document.getElementById("jsx-section");
  var jsxImport = document.getElementById("jsx-import");
  var outputJsx = document.getElementById("output-jsx");
  var btnCopyJsx = document.getElementById("btn-copy-jsx");
  var unmappedHint = document.getElementById("unmapped-hint");
  var devEmpty = document.getElementById("dev-empty");
  var devNodeType = document.getElementById("dev-node-type");
  var devContent = document.getElementById("dev-content");
  var devComponentName = document.getElementById("dev-component-name");
  var devFigmaName = document.getElementById("dev-figma-name");
  var devProps = document.getElementById("dev-props");
  var devDraft = document.getElementById("dev-draft");
  var btnCopyDraft = document.getElementById("btn-copy-draft");
  btnExport.addEventListener("click", () => {
    btnExport.disabled = true;
    btnExport.textContent = "Exporting\u2026";
    statusTokens.textContent = "";
    statusTokens.className = "status";
    parent.postMessage({ pluginMessage: { type: "EXPORT_TOKENS" } }, "*");
  });
  btnCopyTokens.addEventListener("click", () => {
    copyToClipboard(outputTokens.value, btnCopyTokens);
  });
  btnGetTailwind.addEventListener("click", () => {
    btnGetTailwind.disabled = true;
    btnGetTailwind.textContent = "Inspecting\u2026";
    statusTailwind.textContent = "";
    statusTailwind.className = "status";
    jsxSection.classList.add("hidden");
    unmappedHint.classList.add("hidden");
    parent.postMessage({ pluginMessage: { type: "GET_TAILWIND" } }, "*");
  });
  btnCopyTailwind.addEventListener("click", () => {
    copyToClipboard(outputTailwind.value, btnCopyTailwind);
  });
  btnCopyJsx.addEventListener("click", () => {
    const full = `${jsxImport.textContent}

${outputJsx.value}`;
    copyToClipboard(full, btnCopyJsx);
  });
  btnCopyDraft.addEventListener("click", () => {
    copyToClipboard(devDraft.value, btnCopyDraft);
  });
  function renderDevTab(info, nodeType) {
    if (!info) {
      devEmpty.classList.remove("hidden");
      devContent.classList.add("hidden");
      const validTypes = ["INSTANCE", "COMPONENT", "COMPONENT_SET"];
      if (nodeType && !validTypes.includes(nodeType)) {
        devNodeType.classList.remove("hidden");
        devNodeType.textContent = `Selected: ${nodeType} \u2014 select a component, component set, or instance`;
      } else {
        devNodeType.classList.add("hidden");
      }
      return;
    }
    devEmpty.classList.add("hidden");
    devContent.classList.remove("hidden");
    devComponentName.textContent = info.componentName;
    devFigmaName.textContent = `Figma: "${info.figmaNodeName}"`;
    devProps.innerHTML = "";
    for (const prop of info.properties) {
      const el = document.createElement("div");
      el.className = "dev-prop";
      const header = document.createElement("div");
      header.className = "dev-prop-header";
      const nameEl = document.createElement("span");
      nameEl.className = "dev-prop-name";
      nameEl.textContent = prop.name;
      const badge = document.createElement("span");
      badge.className = `dev-type-badge ${prop.type.toLowerCase()}`;
      badge.textContent = prop.type;
      header.appendChild(nameEl);
      header.appendChild(badge);
      el.appendChild(header);
      if (prop.type === "VARIANT" && prop.options.length > 0) {
        const opts = document.createElement("div");
        opts.className = "dev-options";
        for (const opt of prop.options) {
          const chip = document.createElement("span");
          chip.className = "dev-option" + (String(prop.currentValue).toLowerCase() === opt.toLowerCase() ? " current" : "");
          chip.textContent = opt;
          opts.appendChild(chip);
        }
        el.appendChild(opts);
      } else if (prop.type === "TEXT") {
        const val = document.createElement("div");
        val.className = "dev-text-value";
        val.textContent = `"${prop.currentValue}"`;
        el.appendChild(val);
      } else if (prop.type === "BOOLEAN") {
        const val = document.createElement("div");
        val.className = "dev-text-value";
        val.textContent = String(prop.currentValue);
        el.appendChild(val);
      }
      devProps.appendChild(el);
    }
    devDraft.value = info.draft;
  }
  window.onmessage = (event) => {
    var _a;
    const msg = event.data.pluginMessage;
    if (!msg)
      return;
    if (msg.type === "TOKENS_CSS") {
      outputTokens.value = msg.css;
      btnCopyTokens.disabled = false;
      btnExport.disabled = false;
      btnExport.textContent = "Export globals.css";
      statusTokens.textContent = `${msg.count} tokens exported`;
      statusTokens.className = "status success";
    }
    if (msg.type === "TAILWIND_RESULT") {
      btnGetTailwind.disabled = false;
      btnGetTailwind.textContent = "Inspect";
      if (msg.error) {
        statusTailwind.textContent = msg.error;
        statusTailwind.className = "status error";
        return;
      }
      if (msg.jsxResult) {
        jsxSection.classList.remove("hidden");
        unmappedHint.classList.add("hidden");
        jsxImport.textContent = msg.jsxResult.importLine;
        outputJsx.value = msg.jsxResult.jsx;
      } else if (msg.unmappedComponent) {
        jsxSection.classList.add("hidden");
        unmappedHint.classList.remove("hidden");
        unmappedHint.textContent = `"${msg.unmappedComponent}" is not in components.json yet`;
      } else {
        jsxSection.classList.add("hidden");
        unmappedHint.classList.add("hidden");
      }
      outputTailwind.value = msg.classes || "(no classes generated)";
      btnCopyTailwind.disabled = !msg.classes;
      statusTailwind.textContent = msg.nodeName ? `From: ${msg.nodeName}` : "";
      statusTailwind.className = "status";
    }
    if (msg.type === "SELECTION_CHANGE") {
      if (msg.hasSelection) {
        selectionBadge.classList.add("has-selection");
        selectionLabel.textContent = msg.nodeName || "1 node selected";
      } else {
        selectionBadge.classList.remove("has-selection");
        selectionLabel.textContent = "No node selected";
      }
      renderDevTab((_a = msg.componentInfo) != null ? _a : null, msg.nodeType);
    }
    if (msg.type === "ERROR") {
      btnExport.disabled = false;
      btnExport.textContent = "Export globals.css";
      btnGetTailwind.disabled = false;
      btnGetTailwind.textContent = "Get Tailwind Classes";
      statusTokens.textContent = msg.message;
      statusTokens.className = "status error";
      statusTailwind.textContent = msg.message;
      statusTailwind.className = "status error";
    }
  };
})();
</script></body>
</html>
